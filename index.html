async function callAI(messages, system, max=1200) {
  const body = {model:'claude-sonnet-4-20250514',max_tokens:max,messages};
  if(system) body.system = system;
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':'YOUR_API_KEY_HERE','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify(body)
  });
  if(!r.ok) throw new Error('API '+r.status);
  const d = await r.json();
  return d.content?.find(b=>b.type==='text')?.text || '';
}

async function callAIPDF(b64data, prompt) {
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':'YOUR_API_KEY_HERE','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,
      messages:[{role:'user',content:[
        {type:'document',source:{type:'base64',media_type:'application/pdf',data:b64data}},
        {type:'text',text:prompt}
      ]}]
    })
  });
  if(!r.ok) throw new Error('PDF API '+r.status);
  const d = await r.json();
  if(d.error) throw new Error(d.error.message);
  return d.content?.find(b=>b.type==='text')?.text || '';
}

function getPYQs(chs) {
  const qs = [];
  Object.entries(chs).forEach(([sub,arr]) => arr.forEach(ch => { const b=PYQ[ch]; if(b) b.forEach(q=>qs.push({...q,sub,ch})); }));
  return qs.sort(()=>Math.random()-.5).slice(0,20);
}

// ── LOGIN ──
function Login({prof,onOK,t}) {
  const [pin,setPin] = useState('');
  const [shake,setShake] = useState(false);
  function press(k) {
    if(k==='X'){setPin(p=>p.slice(0,-1));return;}
    if(pin.length>=4) return;
    const np=pin+k; setPin(np);
    if(np.length===4){setTimeout(()=>{if(np===prof.pin)onOK();else{setShake(true);setPin('');setTimeout(()=>setShake(false),600);}},100);}
  }
  return e('div',{style:{minHeight:'100vh',background:t.bg,display:'flex',alignItems:'center',justifyContent:'center',padding:24}},
    e('div',{style:{maxWidth:300,width:'100%'}},
      e('div',{style:{textAlign:'center',marginBottom:20}},
        e('div',{style:{fontSize:12,color:t.ac,letterSpacing:2,fontWeight:900,fontFamily:'monospace'}},'JEE COMMAND CENTER'),
        e('div',{style:{fontSize:20,fontWeight:700,color:t.tx,marginTop:10}},greet()+', ',e('span',{style:{color:t.cy}},prof.name),' 👋'),
        e('div',{style:{fontSize:12,color:t.t3,marginTop:4}},'Enter your PIN')
      ),
      e('div',{style:{background:t.bg2,border:'1px solid '+t.bd,borderRadius:14,padding:22,animation:shake?'shake .5s':'none'}},
        e('div',{style:{display:'flex',gap:10,justifyContent:'center',marginBottom:20}},
          [0,1,2,3].map(i=>e('div',{key:i,style:{width:50,height:56,background:t.bg3,border:'2px solid '+(pin.length>i?t.cy:t.bd),borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,color:t.cy,transition:'border-color .2s'}},pin.length>i?'●':''))

        e('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}},
