const toB64=f=>new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(f);});

async function callAI(messages,system,max=1200){
  const body={model:"claude-sonnet-4-20250514",max_tokens:max,messages};
  if(system)body.system=system;
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":"YOUR_KEY_HERE","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true",body:JSON.stringify(body)});
  if(!r.ok){const txt=await r.text();throw new Error("API "+r.status+": "+txt.slice(0,100));}
  const d=await r.json();
  return d.content?.find(b=>b.type==="text")?.text||"";
}
async function callAIPDF(b64data,prompt){
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":"YOUR_KEY_HERE","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,
      messages:[{role:"user",content:[
        {type:"document",source:{type:"base64",media_type:"application/pdf",data:b64data}},
        {type:"text",text:prompt}
      ]}]
    })
  });
  if(!r.ok)throw new Error("PDF API "+r.status);
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return d.content?.find(b=>b.type==="text")?.text||"";
}

function getPYQs(chs){
  const qs=[];
  Object.entries(chs).forEach(([sub,arr])=>arr.forEach(ch=>{const b=PYQ[ch];if(b)b.forEach(q=>qs.push({...q,sub,ch}));}));
  return qs.sort(()=>Math.random()-.5).slice(0,20);
}

function Register({onDone,t}){

  const[p2,setP2]=useState("");

    if(p1.length!==4){setErr("PIN must be 4 digits");return;}
    if(p1!==p2){setErr("PINs don't match");return;}
    const prof={name:name.trim(),target:parseInt(score),college,pin:p1,joined:tod()};
    LS.set(K.p,prof);LS.set(K.mk,[]);LS.set(K.tk,[]);LS.set(K.d,[]);LS.set(K.s,{n:0,last:""});
    onDone(prof);

      style={{width:"100%",background:t.bg3,border:"1px solid "+t.bd,borderRadius:8,padding:"12px 14px",color:t.tx,fontSize:14,outline:"none",marginBottom:10}}/>

    <div style={{minHeight:"100vh",background:t.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>

        </>}
        {step===1&&<>
          <div style={{fontSize:18,fontWeight:700,color:t.tx,marginBottom:14}}>Set your targets</div>
          <div style={{fontSize:10,color:t.t3,letterSpacing:1,marginBottom:8}}>TARGET SCORE (/300)</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}}>

// ── LOGIN ──
function Login({prof,onOK,t}){
  const[pin,setPin]=useState("");
  const[shake,setShake]=useState(false);
  function press(k){
    if(k==="X"){setPin(p=>p.slice(0,-1));return;}
    if(pin.length>=4)return;
    const np=pin+k;setPin(np);
    if(np.length===4){setTimeout(()=>{if(np===prof.pin)onOK();else{setShake(true);setPin("");setTimeout(()=>setShake(false),600);}},100);}
  }
  return(
    <div style={{minHeight:"100vh",background:t.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{maxWidth:300,width:"100%"}}>
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{fontSize:12,color:t.ac,letterSpacing:2,fontWeight:900,fontFamily:"monospace"}}>JEE COMMAND CENTER</div>
          <div style={{fontSize:20,fontWeight:700,color:t.tx,marginTop:10}}>{greet()},<br/><span style={{color:t.cy}}>{prof.name}</span> 👋</div>
          <div style={{fontSize:12,color:t.t3,marginTop:4}}>Enter your PIN</div>
        </div>
        <div style={{background:t.bg2,border:"1px solid "+t.bd,borderRadius:14,padding:22,animation:shake?"shake .5s":"none"}}>
          <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:20}}>
            {[0,1,2,3].map(i=>(
              <div key={i} style={{width:50,height:56,background:t.bg3,border:"2px solid "+(pin.length>i?t.cy:t.bd),borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,color:t.cy,transition:"border-color .2s"}}>
                {pin.length>i?"●":""}
              </div>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
            {["1","2","3","4","5","6","7","8","9","","0","X"].map((k,i)=>(
              <button key={i} onClick={()=>k&&press(k)}
                style={{background:k==="X"?t.re+"18":t.bg3,border:"1px solid "+(k==="X"?t.re+"40":t.bd),borderRadius:10,padding:15,fontSize:k==="X"?18:16,color:k==="X"?t.re:t.tx,cursor:k?"pointer":"default",fontWeight:600}}>
                {k==="X"?"⌫":k}
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── ONBOARD PYQ ──
function ObPYQ({prof,chs,onDone,t}){
  const[phase,setPhase]=useState("intro");
  const[qs]=useState(()=>getPYQs(chs));
  const[qi,setQi]=useState(0);
  const[answers,setAnswers]=useState([]);
  const[sel,setSel]=useState(null);

  function pick(i){if(sel!==null)return;setSel(i);}
  function next(){
    const na=[...answers,{chosen:sel,correct:qs[qi].ans,ch:qs[qi].ch,sub:qs[qi].sub}];
    setAnswers(na);setSel(null);
    if(qi<qs.length-1)setQi(x=>x+1);else finish(na);
  }
  function finish(all){
    const cs={};
    all.forEach(a=>{if(!cs[a.ch])cs[a.ch]={c:0,t:0,sub:a.sub};cs[a.ch].t++;if(a.chosen===a.correct)cs[a.ch].c++;});
    const m={};
    Object.keys(ALL_CH).forEach(sub=>{
      m[sub]={};
      ALL_CH[sub].forEach(ch=>{
        if(cs[ch]){const r=cs[ch].c/cs[ch].t;m[sub][ch]=r===1?88:r>=.5?65:r>0?42:20;}
        else if(chs[sub]?.includes(ch))m[sub][ch]=50;
        else m[sub][ch]=0;
      });
    });
    LS.set(K.m,m);LS.set(K.ch,chs);LS.set(K.ob,{done:true});
    setPhase("done");setTimeout(()=>onDone(m),1200);
  }

  if(!qs.length)return(
    <div style={{minHeight:"100vh",background:t.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center",color:t.tx,padding:24}}>
        <div style={{fontSize:36,marginBottom:12}}>⚠️</div>
        <div style={{marginBottom:8,fontSize:15}}>No PYQs found for selected chapters.</div>
        <div style={{fontSize:13,color:t.t2,marginBottom:20}}>Try selecting Mechanics, Calculus, Organic etc.</div>
        <button onClick={()=>onDone({})} style={{background:t.cy,border:"none",borderRadius:10,padding:"12px 24px",color:"#000",fontWeight:700}}>Skip →</button>
      </div>
    </div>
  );

  const q=qs[qi];
  return(
    <div style={{minHeight:"100vh",background:t.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:620}}>
        {phase==="intro"&&(
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:40,marginBottom:12}}>📋</div>
            <div style={{fontSize:12,color:t.cy,letterSpacing:2,marginBottom:8,fontFamily:"monospace"}}>PYQ BASELINE TEST</div>
            <div style={{fontSize:19,fontWeight:700,color:t.tx,marginBottom:8}}>Real JEE Assessment</div>
            <div style={{fontSize:13,color:t.t2,marginBottom:24,lineHeight:1.8}}><strong style={{color:t.cy}}>{qs.length} questions</strong> from your chapters.<br/>Answer honestly to map your starting mastery.</div>
            <button onClick={()=>setPhase("test")} style={{background:"linear-gradient(135deg,#f97316,#dc2626)",border:"none",borderRadius:12,padding:"14px 30px",color:"#fff",fontSize:14,fontWeight:800}}>⚡ START TEST →</button>
          </div>
        )}
        {phase==="test"&&q&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
              <span style={{fontSize:10,color:t.t3,letterSpacing:2}}>PYQ ASSESSMENT</span>
              <span style={{fontSize:10,color:t.t3}}><span style={{color:t.gr}}>✓{answers.filter(a=>a.chosen===a.correct).length}</span> · {qi+1}/{qs.length}</span>
            </div>
            <div style={{background:t.bg3,borderRadius:2,height:3,marginBottom:16}}>
              <div style={{width:(qi/qs.length*100)+"%",height:"100%",background:"linear-gradient(90deg,"+t.cy+","+t.pu+")",borderRadius:2,transition:"width .3s"}}/>
            </div>
            <div style={{background:t.bg2,border:"1px solid "+t.bd,borderRadius:12,padding:18,marginBottom:12}}>
              <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
                <span style={{fontSize:10,color:SC[q.sub],background:SC[q.sub]+"20",padding:"3px 10px",borderRadius:20}}>{q.sub}</span>
                <span style={{fontSize:10,color:t.t3,background:t.bg3,padding:"3px 10px",borderRadius:20}}>{q.ch}</span>
                <span style={{fontSize:10,color:"#fbbf24",background:"#fbbf2418",padding:"3px 10px",borderRadius:20}}>JEE LEVEL</span>
              </div>
              <div style={{fontSize:15,color:t.tx,lineHeight:1.7,fontWeight:500}}>{q.q}</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:14}}>
              {q.opts.map((opt,i)=>{
                let bg=t.bg2,brd=t.bd,col=t.t2;

                    style={{background:bg,border:"1px solid "+brd,borderRadius:10,padding:"12px 16px",textAlign:"left",cursor:sel!==null?"default":"pointer",display:"flex",alignItems:"center",gap:12,transition:"all .1s"}}>

                    {sel!==null&&i===q.ans&&<span>✅</span>}
                    {sel!==null&&i===sel&&sel!==q.ans&&<span>❌</span>}
                  </button>
                );

            </div>
            {sel!==null&&<>
              {q.exp&&<div style={{background:t.bg3,border:"1px solid "+t.bd,borderRadius:10,padding:14,marginBottom:12}}>
                <div style={{fontSize:10,color:t.cy,letterSpacing:1,marginBottom:4}}>EXPLANATION</div>
                <div style={{fontSize:13,color:t.t2,lineHeight:1.7}}>{q.exp}</div>
              </div>}
              <button onClick={next} style={{width:"100%",background:"linear-gradient(135deg,#22d3ee,#0891b2)",border:"none",borderRadius:10,padding:14,color:"#000",fontSize:13,fontWeight:800}}>
                {qi<qs.length-1?"Next →":"Finish →"}

        )}
        {phase==="done"&&<div style={{textAlign:"center"}}><div style={{fontSize:48,marginBottom:10}}>🎯</div><div style={{fontFamily:"monospace",fontSize:13,color:t.gr,letterSpacing:2}}>BASELINE LOCKED!</div><div style={{display:"flex",justifyContent:"center",marginTop:18}}><Spin sz={34} c={t.gr}/></div></div>}
      </div>
    </div>
  );
}

function AITab({prof,mastery,mocks,streak,setSt,t}){
  const[view,setView]=useState("ck");
  const[log,setLog]=useState(null);
  const[qi,setQi]=useState(0);

  const[nt,setNt]=useState("");

  const[zh,setZh]=useState([]);
  const[zi,setZi]=useState("");

  useEffect(()=>{
    const dl=LS.get(K.d)||[];const at=LS.get(K.tk)||[];
    const td=dl.find(d=>d.date===tod());
    if(td){setLog(td);if(td.plan){const sec=td.plan.split(/^## /m).filter(Boolean).map(x=>{const[ti,...b]=x.split("\n");return{ti:ti.trim(),b:b.join("\n").trim()};});setPlan(sec);}setView("done");}
    setTasks(at.filter(x=>x.date===tod()));
  },[]);
  useEffect(()=>{endR.current?.scrollIntoView({behavior:"smooth"});},[zh]);

  function pickA(i){const q=CKQ[qi];const na={...ans,[q.id]:q.opts[i]};setAns(na);setTimeout(()=>{if(qi<CKQ.length-1)setQi(x=>x+1);else setView("tasks");},280);}
  function addTask(){if(!nt.trim())return;const tk={id:tod()+"-"+Date.now(),text:nt.trim(),done:false,date:tod(),auto:false};setTasks(p=>[...p,tk]);const a=LS.get(K.tk)||[];LS.set(K.tk,[...a,tk]);setNt("");}
  function togTask(id){setTasks(p=>p.map(x=>x.id===id?{...x,done:!x.done}:x));const a=LS.get(K.tk)||[];LS.set(K.tk,a.map(x=>x.id===id?{...x,done:!x.done}:x));}

  async function genPlan(){
    setView("planning");
    const weak=Object.entries(mastery).flatMap(([sub,chs])=>Object.entries(chs||{}).filter(([,v])=>v>0&&v<55).map(([ch,v])=>({sub,ch,v}))).sort((a,b)=>a.v-b.v).slice(0,5);
    const sys="You are ZEUS, "+prof.name+"'s JEE teacher. Verify all math. Be precise and direct.";
    const msg="Student: "+prof.name+" | Target: "+prof.target+"/300 | Days to JEE: "+getCD().D+"\nCHECK-IN:\n"+Object.entries(ans).map(([k,v])=>"- "+CKQ.find(q=>q.id===k)?.text+" → "+v).join("\n")+"\nMASTERY: Physics "+avgO(mastery.Physics||{})+"% | Chemistry "+avgO(mastery.Chemistry||{})+"% | Math "+avgO(mastery.Mathematics||{})+"%\nWEAK: "+weak.map(w=>w.ch+"("+w.sub+"):"+w.v+"%").join(", ")+"\nMOCKS: "+mocks.length+"/20 | Latest: "+(mocks[mocks.length-1]?.score||"N/A")+"/300\n\n## 💬 ZEUS SAYS\n(3 direct sentences)\n\n## ⚡ TOMORROW'S TOP 3 TASKS\n1. [Sub]: [Chapter] — [Action] — [Time]\n2. [Sub]: [Chapter] — [Action] — [Time]\n3. [Sub]: [Chapter] — [Action] — [Time]\n\n## 📚 REVISE TONIGHT\n[One formula with math]\n\n## 🎯 THIS WEEK'S TARGET\n[One measurable goal]";
    try{

      setPlan(sec);
      const pt=sec.find(s=>s.ti.includes("TOMORROW"))?.b.split("\n").filter(l=>l.match(/^\d+\./)).slice(0,3).map((l,i)=>({id:tod()+"-a"+i,text:l.replace(/^\d+\.\s*/,""),done:false,date:tod(),auto:true}))||[];

      const s=LS.get(K.s)||{n:0,last:""};const yst=new Date();yst.setDate(yst.getDate()-1);const yS=yst.toISOString().slice(0,10);
      const ns=s.last===yS?{n:s.n+1,last:tod()}:s.last===tod()?s:{n:1,last:tod()};
      LS.set(K.s,ns);setSt(ns);
    }catch(e){setPlan([{ti:"Error",b:e.message}]);}
    setView("done");

// ── MOCK TAB ──
function MockTab({prof,mastery,mocks,setMocks,setMastery,t}){
  const[phase,setPhase]=useState("idle");
  const[pdf,setPdf]=useState(null);
  const[drag,setDrag]=useState(false);
  const[status,setStatus]=useState("");
  const[report,setReport]=useState(null);
  const[qi,setQi]=useState(0);
  const[ans,setAns]=useState({});
  const[plan,setPlan]=useState([]);
  const[err,setErr]=useState("");
  const fRef=useRef(null);
  const mn=mocks.length+1;
  const MQ=[
    {id:"tm",icon:"⏱",text:"Time management?",opts:["Ran out of time","Rushed at end","Spare time but errors","Time was fine"]},
    {id:"rs",icon:"🧠",text:"Why did you lose marks?",opts:["Silly errors","Didn't know concept","Knew it, couldn't apply","Too much negative marking"]},
    {id:"hd",icon:"📚",text:"Hardest subject?",opts:["Physics","Chemistry","Mathematics","All equal"]},
    {id:"st",icon:"🔍",text:"Attempt strategy?",opts:["Too long on hard Qs","Skipped easy Qs","Good strat bad execution","No strategy"]},
    {id:"mn",icon:"😤",text:"Mental state?",opts:["Panicked early","Great start stressed later","Calm — knowledge gap","Overconfident"]},
  ];
  async function scan(){
    if(!pdf)return;setPhase("sc");setErr("");
    try{
      setStatus("Reading PDF...");
      const data=await toB64(pdf);
      setStatus("ZEUS extracting scores...");
      const prompt='Analyse this JEE mock test PDF. Return ONLY valid JSON with no extra text:\n{"testName":"string","totalScore":0,"physicsScore":0,"chemistryScore":0,"mathScore":0,"physicsCorrect":0,"physicsWrong":0,"physicsUnattempted":0,"chemistryCorrect":0,"chemistryWrong":0,"chemistryUnattempted":0,"mathCorrect":0,"mathWrong":0,"mathUnattempted":0,"topicAccuracy":{"Physics":{"Mechanics":null,"Electrostatics":null,"Thermodynamics":null,"Optics":null,"Modern Physics":null},"Chemistry":{"Organic":null,"Inorganic":null,"Physical":null,"Electrochemistry":null},"Mathematics":{"Calculus":null,"Algebra":null,"Probability":null}},"percentile":null}\nExtract exact numbers. Use null if not found.';
      const raw=await callAIPDF(data,prompt);
      const clean=raw.replace(/```json|```/g,"").trim();
      const d=JSON.parse(clean);
      if(typeof d.totalScore!=="number")throw new Error("Score not found in PDF");
      setReport(d);setPhase("mcq");setQi(0);setAns({});
    }catch(e){setErr("Error: "+e.message);setPhase("idle");}
  }
  function pickQ(i){const q=MQ[qi];const na={...ans,[q.id]:q.opts[i]};setAns(na);setTimeout(()=>{if(qi<MQ.length-1)setQi(x=>x+1);else build(na);},280);}
  async function build(fa){
    setPhase("bl");
    const sys="You are ZEUS, "+prof.name+"'s JEE teacher. Verify all maths.";
    const neg=(report.physicsWrong||0)+(report.chemistryWrong||0)+(report.mathWrong||0);
    const msg="MOCK #"+mn+": Total "+report.totalScore+"/300"+(report.percentile?" | "+report.percentile+"%ile":"")+"\nPhysics "+report.physicsScore+"/100 ✓"+(report.physicsCorrect||"?")+" ✗"+(report.physicsWrong||"?")+"\nChemistry "+report.chemistryScore+"/100 ✓"+(report.chemistryCorrect||"?")+" ✗"+(report.chemistryWrong||"?")+"\nMath "+report.mathScore+"/100 ✓"+(report.mathCorrect||"?")+" ✗"+(report.mathWrong||"?")+"\nNegative marks: ~"+neg+"\n\nSELF-ASSESSMENT:\n"+MQ.map(q=>fa[q.id]?"- "+q.text+" → "+fa[q.id]:null).filter(Boolean).join("\n")+"\n\n## 🔬 ROOT CAUSE ANALYSIS\n## ⚡ 3 CRITICAL FIXES\n## 📅 7-DAY STUDY PLAN\n## 🎯 TOP 5 PRIORITY CHAPTERS\n## 🏁 TARGET FOR MOCK #"+(mn+1);
    try{
      const raw=await callAI([{role:"user",content:msg}],sys,2000);
      const nm={test:"M"+mn,score:report.totalScore,phy:report.physicsScore,chem:report.chemistryScore,math:report.mathScore,date:tod()};
      const nm2=[...mocks,nm];LS.set(K.mk,nm2);setMocks(nm2);
      if(report.topicAccuracy){
        const nM=JSON.parse(JSON.stringify(mastery));
        Object.entries(report.topicAccuracy).forEach(([sub,chs])=>{
          if(!nM[sub])nM[sub]={};
          Object.entries(chs||{}).forEach(([ch,val])=>{if(val!==null&&val!==undefined)nM[sub][ch]=Math.round(((nM[sub][ch]||50)*.35+val*.65));});
        });
        LS.set(K.m,nM);setMastery(nM);
      }
      const sec=raw.split(/^## /m).filter(Boolean).map(x=>{const[ti,...b]=x.split("\n");return{ti:ti.trim(),b:b.join("\n").trim()};});
      setPlan(sec);setPhase("done");
    }catch(e){setPlan([{ti:"Error",b:e.message}]);setPhase("done");}
  }
  function reset(){setPhase("idle");setPdf(null);setReport(null);setAns({});setQi(0);setPlan([]);setErr("");}
  const curQ=MQ[qi];
  const sc=[t.ac,t.re,t.cy,t.gr,t.pu,"#fbbf24"];
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{background:t.bg2,border:"1px solid "+t.bd,borderRadius:12,padding:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <Lbl t={t}>MOCK SERIES PROGRESS</Lbl>
          <div style={{fontFamily:"monospace",fontSize:18,color:t.cy}}>{mocks.length}<span style={{fontSize:10,color:t.t3}}>/20</span></div>
        </div>
        <div style={{background:t.bg3,borderRadius:3,height:6,overflow:"hidden",marginBottom:8}}>
          <div style={{width:(mocks.length/20*100)+"%",height:"100%",background:"linear-gradient(90deg,#0891b2,"+t.cy+")",borderRadius:3,transition:"width .5s"}}/>
        </div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {Array.from({length:20}).map((_,i)=>(
            <div key={i} title={mocks[i]?mocks[i].test+": "+mocks[i].score+"/300":""} style={{width:12,height:12,borderRadius:"50%",background:i<mocks.length?t.cy:i===mocks.length?t.ac:t.bg3}}/>
          ))}
        </div>
      </div>

      {phase==="idle"&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <div style={{background:t.bg2,border:"1px solid "+t.cy+"44",borderRadius:14,padding:18}}>
              <div style={{fontSize:20,marginBottom:8}}>🎓</div>
              <div style={{fontFamily:"monospace",fontSize:10,color:t.cy,letterSpacing:1,marginBottom:4}}>MOCK DEBRIEF · M{mn}</div>
              <div style={{fontSize:12,color:t.t2,lineHeight:1.8}}>Upload PDF → 5 MCQs → 7-day battle plan. Works with Examgoal, NTA, Allen formats.</div>
            </div>
            <div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)}
              onDrop={e=>{e.preventDefault();setDrag(false);const f=e.dataTransfer.files[0];if(f?.type==="application/pdf"){setPdf(f);setErr("");}else setErr("PDF only");}}
              onClick={()=>fRef.current?.click()}
              style={{border:"2px dashed "+(drag?t.cy:pdf?t.cy+"80":t.bd),borderRadius:12,padding:"22px 18px",textAlign:"center",cursor:"pointer",background:t.bg3}}>
              <input ref={fRef} type="file" accept=".pdf" onChange={e=>{const f=e.target.files[0];if(f){setPdf(f);setErr("");}}} style={{display:"none"}}/>
              {pdf?(<><div style={{fontSize:22,marginBottom:4}}>✅</div><div style={{fontSize:12,color:t.cy,fontWeight:600}}>{pdf.name}</div></>):(
                <><div style={{fontSize:28,marginBottom:6}}>📋</div><div style={{fontSize:13,color:t.t2}}>Tap to upload Mock #{mn} PDF</div></>
              )}
            </div>
            {err&&<div style={{fontSize:12,color:t.re,background:t.re+"15",border:"1px solid "+t.re+"30",borderRadius:8,padding:"10px 12px"}}>{err}</div>}
            <button disabled={!pdf} onClick={scan} style={{background:pdf?"linear-gradient(135deg,#22d3ee,#0891b2)":"#374151",border:"none",borderRadius:12,padding:14,color:pdf?"#000":"#6b7280",fontSize:13,fontWeight:800}}>
              ⚡ SCAN AND ANALYSE →
            </button>
          </div>
          <div style={{background:t.bg2,border:"1px solid "+t.bd,borderRadius:12,padding:16}}>
            <Lbl t={t}>PREVIOUS MOCKS</Lbl>
            {mocks.length>0?[...mocks].reverse().slice(0,6).map((m,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderTop:i>0?"1px solid "+t.bd:undefined}}>
                <span style={{fontFamily:"monospace",fontSize:12,color:t.ac,fontWeight:700}}>{m.test}</span>
                <span style={{fontSize:13,fontWeight:700,color:t.tx}}>{m.score}/300</span>
                <div style={{display:"flex",gap:8}}>
                  {[["P",m.phy,"#f97316"],["C",m.chem,"#22d3ee"],["M",m.math,"#a78bfa"]].map(([l,v,c])=>(
                    <span key={l} style={{fontSize:9,color:c,fontFamily:"monospace"}}>{l}:{v}</span>
                  ))}
                </div>
              </div>
            )):<div style={{fontSize:12,color:t.t3,textAlign:"center",padding:"30px 0"}}>No mocks yet.</div>}
          </div>
        </div>
      )}

      {(phase==="sc"||phase==="bl")&&(
        <div style={{background:t.bg2,border:"1px solid "+t.bd,borderRadius:12,padding:60,textAlign:"center"}}>
          <div style={{display:"flex",justifyContent:"center",marginBottom:18}}><Spin sz={44} c={t.cy}/></div>
          <div style={{fontFamily:"monospace",fontSize:11,color:t.cy,letterSpacing:2,marginBottom:8}}>
            {phase==="sc"?"ZEUS READING REPORT":"BUILDING YOUR PLAN"}
          </div>
          <div style={{fontSize:12,color:t.t3}}>{status}</div>
        </div>
      )}

      {phase==="mcq"&&curQ&&(
        <div style={{display:"grid",gridTemplateColumns:"210px 1fr",gap:14}}>
          <div style={{background:t.bg2,border:"1px solid "+t.bd,borderRadius:12,padding:16}}>
            <Lbl t={t}>EXTRACTED</Lbl>
            <div style={{fontFamily:"monospace",fontSize:24,color:t.ac,fontWeight:900}}>{report?.totalScore}/300</div>
            <div style={{fontSize:10,color:t.t3,marginBottom:10}}>{report?.testName}</div>
            {[["Physics",report?.physicsScore,"#f97316"],["Chemistry",report?.chemistryScore,"#22d3ee"],["Math",report?.mathScore,"#a78bfa"]].map(([s,v,c])=>(
              <div key={s} style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
                <span style={{fontSize:12,color:t.t2}}>{s}</span>
                <span style={{fontFamily:"monospace",fontSize:12,color:c,fontWeight:700}}>{v}/100</span>
              </div>
            ))}
            <div style={{marginTop:10,borderTop:"1px solid "+t.bd,paddingTop:10}}>
              {MQ.map((q,i)=>(
                <div key={q.id} style={{display:"flex",gap:6,alignItems:"center",marginBottom:6}}>
                  <div style={{width:18,height:18,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:700,flexShrink:0,
                    background:ans[q.id]?t.cy+"22":i===qi?t.ac+"22":t.bg3,
                    border:"1px solid "+(ans[q.id]?t.cy:i===qi?t.ac:t.bd),
                    color:ans[q.id]?t.cy:i===qi?t.ac:t.t3}}>
                    {ans[q.id]?"✓":i===qi?"→":i+1}
                  </div>
                  <span style={{fontSize:10,color:i===qi?t.tx:ans[q.id]?t.cy:t.t3}}>{q.icon} {q.text.slice(0,20)}...</span>
                </div>
              ))}
            </div>
          </div>
          <div style={{background:t.bg2,border:"1px solid "+t.bd,borderRadius:12,padding:22,display:"flex",flexDirection:"column",justifyContent:"center"}}>
            <div style={{background:t.bg3,borderRadius:2,height:3,marginBottom:18}}>
              <div style={{width:(qi/MQ.length*100)+"%",height:"100%",background:"linear-gradient(90deg,"+t.pu+","+t.cy+")",borderRadius:2,transition:"width .3s"}}/>
            </div>
            <div style={{fontSize:24,marginBottom:8}}>{curQ.icon}</div>
            <div style={{fontSize:16,color:t.tx,fontWeight:600,marginBottom:18,lineHeight:1.5}}>{curQ.text}</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {curQ.opts.map((opt,i)=>(
                <button key={i} onClick={()=>pickQ(i)}
                  style={{background:t.bg2,border:"1px solid "+t.bd,borderRadius:10,padding:"12px 16px",textAlign:"left",cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:26,height:26,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,background:t.bg3,color:t.t3,flexShrink:0}}>{String.fromCharCode(65+i)}</div>
                  <span style={{fontSize:13,color:t.t2}}>{opt}</span>
                </button>
              ))}
            </div>
          </div>
        </div>
      )}

      {phase==="done"&&(
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{background:t.gr+"12",border:"1px solid "+t.gr+"33",borderRadius:12,padding:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontFamily:"monospace",fontSize:10,color:t.gr,letterSpacing:2}}>M{mn} PLAN READY ✅</div>
              <div style={{fontSize:11,color:t.t3,marginTop:2}}>{report?.totalScore}/300 · Mastery updated</div>
            </div>
            <button onClick={reset} style={{background:t.bg3,border:"1px solid "+t.bd,borderRadius:8,padding:"8px 12px",color:t.t2,fontSize:11}}>+ NEW</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
            {[{l:"TOTAL",v:report?.totalScore,c:t.ac},{l:"PHY",v:report?.physicsScore,c:"#f97316"},{l:"CHEM",v:report?.chemistryScore,c:"#22d3ee"},{l:"MATH",v:report?.mathScore,c:"#a78bfa"}].map((x,i)=>(
              <div key={i} style={{background:t.bg2,border:"1px solid "+x.c+"33",borderRadius:10,padding:"12px 14px",borderLeft:"3px solid "+x.c,textAlign:"center"}}>
                <div style={{fontSize:9,color:t.t3,letterSpacing:1,marginBottom:3}}>{x.l}</div>
                <div style={{fontFamily:"monospace",fontSize:22,color:x.c,fontWeight:700}}>{x.v}</div>
              </div>
            ))}
          </div>
          {plan.map((s,i)=>(
            <div key={i} style={{background:t.bg2,border:"1px solid "+t.bd,borderRadius:12,borderLeft:"3px solid "+sc[i%sc.length],padding:16}}>
              <div style={{fontSize:12,color:sc[i%sc.length],fontWeight:700,marginBottom:8}}>{s.ti}</div>
              <div style={{fontSize:13,color:t.t2,lineHeight:1.85,whiteSpace:"pre-wrap"}}>{s.b}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── PROGRESS ──
function Progress({mastery,mocks,t}){
  const[sub,setSub]=useState("Physics");
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
        {Object.keys(ALL_CH).map(s=>(
          <div key={s} style={{background:t.bg2,border:"1px solid "+SC[s]+"33",borderRadius:12,padding:"13px 15px",borderLeft:"3px solid "+SC[s]}}>
            <div style={{fontSize:9,color:t.t3,letterSpacing:2,marginBottom:3}}>{s.toUpperCase()}</div>
            <div style={{fontFamily:"monospace",fontSize:24,color:SC[s],fontWeight:700}}>{avgO(mastery[s]||{})}%</div>
            <div style={{fontSize:10,color:t.t3}}>{Object.values(mastery[s]||{}).filter(v=>v>0).length} chapters mapped</div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <div style={{background:t.bg2,border:"1px solid "+t.bd,borderRadius:12,padding:16}}>
          <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
            {Object.keys(ALL_CH).map(s=>(
              <button key={s} onClick={()=>setSub(s)} style={{flex:1,background:sub===s?SC[s]+"22":t.bg3,border:"1px solid "+(sub===s?SC[s]:t.bd),borderRadius:8,padding:"7px 10px",fontSize:11,color:sub===s?SC[s]:t.t2,fontWeight:600}}>
                {SI[s]} {s.slice(0,4)}
              </button>
            ))}
          </div>
          <div style={{maxHeight:340,overflowY:"auto"}}>
            {ALL_CH[sub].map(ch=>{
              const v=mastery[sub]?.[ch]||0;
              return <PBar key={ch} label={ch} val={v} color={v>0?SC[sub]:t.bd2} t={t}/>;
            })}
          </div>
        </div>
        <div style={{background:t.bg2,border:"1px solid "+t.bd,borderRadius:12,padding:16}}>
          <Lbl t={t}>RECENT MOCKS</Lbl>
          {mocks.length>0?[...mocks].reverse().slice(0,8).map((m,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderTop:i>0?"1px solid "+t.bd:undefined}}>
              <span style={{fontFamily:"monospace",fontSize:12,color:t.ac,fontWeight:700}}>{m.test}</span>
              <span style={{fontSize:13,fontWeight:700,color:t.tx}}>{m.score}/300</span>
              <div style={{display:"flex",gap:8}}>
                {[["P",m.phy,"#f97316"],["C",m.chem,"#22d3ee"],["M",m.math,"#a78bfa"]].map(([l,v,c])=>(
                  <span key={l} style={{fontSize:9,color:c,fontFamily:"monospace"}}>{l}:{v}</span>
                ))}
              </div>
            </div>
          )):<div style={{fontSize:12,color:t.t3,textAlign:"center",padding:"30px 0"}}>No mocks yet.</div>}
          <div style={{marginTop:16,borderTop:"1px solid "+t.bd,paddingTop:12}}>
            <Lbl t={t}>SUBJECT OVERVIEW</Lbl>
            {Object.keys(ALL_CH).map(s=>{
              const v=avgO(mastery[s]||{});
              return(
                <div key={s} style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                    <span style={{fontSize:12,color:t.t2}}>{SI[s]} {s}</span>
                    <span style={{fontSize:12,color:SC[s],fontFamily:"monospace",fontWeight:700}}>{v}%</span>
                  </div>
                  <div style={{background:t.bg3,borderRadius:3,height:6}}>
                    <div style={{width:v+"%",height:"100%",borderRadius:3,background:"linear-gradient(90deg,"+SC[s]+"60,"+SC[s]+")",transition:"width .8s"}}/>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── ROOT APP ──
function App(){
  const[dark,setDark]=useState(()=>LS.get(K.dk)!==false);
  const[screen,setScreen]=useState("load");
  const[prof,setProf]=useState(null);
  const[mastery,setMastery]=useState({});
  const[chs,setChs]=useState({Physics:[],Chemistry:[],Mathematics:[]});
  const[mocks,setMocks]=useState([]);
  const[streak,setSt]=useState({n:0,last:""});
  const[tab,setTab]=useState("dash");
  const t={...TH(dark),dark};

  useEffect(()=>{
    document.body.style.background=t.bg;
    document.body.style.color=t.tx;
  },[dark]);

  useEffect(()=>{
    try{
      const p=LS.get(K.p);
      if(!p){setScreen("welcome");return;}
      setProf(p);
      const ob=LS.get(K.ob);
      if(!ob?.done){setScreen("ob_ch");return;}
      setMastery(LS.get(K.m)||{});
      setChs(LS.get(K.ch)||{Physics:[],Chemistry:[],Mathematics:[]});
      setMocks(LS.get(K.mk)||[]);
      setSt(LS.get(K.s)||{n:0,last:""});
      setScreen("login");
    }catch(e){setScreen("welcome");}
  },[]);

  const tog=()=>{const v=!dark;setDark(v);LS.set(K.dk,v);};
  const TABS=[{id:"dash",l:"🏠 Dashboard"},{id:"ai",l:"🎓 AI Mentor"},{id:"mock",l:"📋 Mock Test"},{id:"prog",l:"📊 Progress"}];

  if(screen==="load")return(
    <div style={{minHeight:"100vh",background:t.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <Spin sz={36} c={t.cy}/>
    </div>
  );
  if(screen==="welcome")return <Welcome onS={()=>setScreen("reg")} onL={()=>{const p=LS.get(K.p);if(p){setProf(p);setScreen(LS.get(K.ob)?.done?"login":"ob_ch");}}} t={t}/>;
  if(screen==="reg")return <Register onDone={p=>{setProf(p);setScreen("ob_ch");}} t={t}/>;
  if(screen==="login"&&prof)return <Login prof={prof} onOK={()=>setScreen("app")} t={t}/>;
  if(screen==="ob_ch"&&prof)return <ObCh prof={prof} onDone={s=>{setChs(s);setScreen("ob_pyq");}} t={t}/>;
  if(screen==="ob_pyq"&&prof)return <ObPYQ prof={prof} chs={chs} onDone={m=>{setMastery(m);const p=LS.get(K.p);if(p)setProf(p);setMocks(LS.get(K.mk)||[]);setSt(LS.get(K.s)||{n:0,last:""});setScreen("login");}} t={t}/>;

  return(
    <div style={{minHeight:"100vh",background:t.bg,color:t.tx}}>
      <div style={{borderBottom:"1px solid "+t.bd,background:t.bg+"f0",backdropFilter:"blur(20px)",position:"sticky",top:0,zIndex:100,padding:"0 18px"}}>
        <div style={{maxWidth:1200,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:50}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:28,height:28,borderRadius:6,background:"linear-gradient(135deg,#f97316,#dc2626)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,boxShadow:"0 0 10px rgba(249,115,22,.4)"}}>⚔</div>
            <div>
              <div style={{fontFamily:"monospace",fontSize:10,fontWeight:900,letterSpacing:2,color:t.ac}}>JEE COMMAND CENTER</div>
              <div style={{fontSize:8,color:t.t3,letterSpacing:2}}>{prof?.name?.toUpperCase()} · {streak.n} DAY STREAK 🔥</div>
            </div>
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={tog} style={{background:t.bg3,border:"1px solid "+t.bd,borderRadius:16,padding:"5px 10px",fontSize:11,color:t.t2}}>{dark?"☀️ Light":"🌙 Dark"}</button>
            <button onClick={()=>setScreen("login")} style={{background:t.bg3,border:"1px solid "+t.bd,borderRadius:6,padding:"5px 8px",fontSize:11,color:t.t3}}>🔒</button>
          </div>
        </div>
      </div>
      <div style={{borderBottom:"1px solid "+t.bd,padding:"0 18px",background:t.bg,overflowX:"auto"}}>
        <div style={{maxWidth:1200,margin:"0 auto",display:"flex",minWidth:"max-content"}}>
          {TABS.map(tb=>(
            <button key={tb.id} onClick={()=>setTab(tb.id)} style={{padding:"11px 16px",fontSize:11,letterSpacing:1,fontWeight:600,background:"none",border:"none",color:tab===tb.id?t.ac:t.t3,borderBottom:tab===tb.id?"2px solid "+t.ac:"2px solid transparent",whiteSpace:"nowrap",transition:"all .2s"}}>
              {tb.l}
            </button>
          ))}
        </div>
      </div>
      <div style={{maxWidth:1200,margin:"0 auto",padding:18}}>
        {tab==="dash"&&<Dashboard prof={prof} mastery={mastery} mocks={mocks} streak={streak} t={t}/>}
        {tab==="ai"&&<AITab prof={prof} mastery={mastery} mocks={mocks} streak={streak} setSt={setSt} t={t}/>}
        {tab==="mock"&&<MockTab prof={prof} mastery={mastery} mocks={mocks} setMocks={setMocks} setMastery={setMastery} t={t}/>}
        {tab==="prog"&&<Progress mastery={mastery} mocks={mocks} t={t}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
